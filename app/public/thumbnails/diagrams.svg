<svg xmlns="http://www.w3.org/2000/svg" width="600" height="375" fill="none" viewBox="0 0 600 375">
  <rect width="600" height="375" fill="#fafafa"/>
  <!-- Top node -->
  <rect x="230" y="60" width="140" height="48" rx="10" fill="#171717"/>
  <rect x="264" y="78" width="72" height="10" rx="5" fill="#525252"/>
  <!-- Connector: top to left -->
  <line x1="270" y1="108" x2="180" y2="170" stroke="#d4d4d4" stroke-width="2"/>
  <!-- Connector: top to right -->
  <line x1="330" y1="108" x2="420" y2="170" stroke="#d4d4d4" stroke-width="2"/>
  <!-- Left node -->
  <rect x="110" y="170" width="140" height="48" rx="10" fill="#f5f5f5" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="138" y="188" width="84" height="10" rx="5" fill="#a3a3a3"/>
  <!-- Right node -->
  <rect x="350" y="170" width="140" height="48" rx="10" fill="#f5f5f5" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="378" y="188" width="84" height="10" rx="5" fill="#a3a3a3"/>
  <!-- Connector: left to bottom -->
  <line x1="180" y1="218" x2="270" y2="280" stroke="#d4d4d4" stroke-width="2"/>
  <!-- Connector: right to bottom -->
  <line x1="420" y1="218" x2="330" y2="280" stroke="#d4d4d4" stroke-width="2"/>
  <!-- Bottom node -->
  <rect x="230" y="280" width="140" height="48" rx="10" fill="#171717"/>
  <rect x="264" y="298" width="72" height="10" rx="5" fill="#525252"/>
  <!-- Decorative dots -->
  <circle cx="520" cy="100" r="4" fill="#a3a3a3" opacity="0.5"/>
  <circle cx="534" cy="88" r="3" fill="#a3a3a3" opacity="0.3"/>
  <circle cx="80" cy="290" r="3.5" fill="#a3a3a3" opacity="0.4"/>
  <circle cx="66" cy="278" r="2.5" fill="#a3a3a3" opacity="0.25"/>
</svg>
